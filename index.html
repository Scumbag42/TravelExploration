<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>探索中国大美山河</title>
  <style>
    :root {
      --mask-color: 248, 244, 236;
      --border-radius: 24px;
      --glow-padding: 60px;
      --edge-proximity: 0;
      --cursor-angle: 45deg;
      --edge-sensitivity: 20;
      --color-sensitivity: calc(var(--edge-sensitivity) + 20);
      --cone-spread: 30;
      --fill-opacity: 0.6;
      --card-bg: transparent;
      --text-fade: 0.7s;
      /* 明暗主题基础变量 */
      --page-bg: #f5f3ef;
      --text-main: #26251e;
      --text-sub: #504f49;
      --control-bg: rgba(255, 255, 255, 0.72);
      --control-text: #1d1d1f;
      --control-border: rgba(0,0,0,0.08);
    }

    /* 深色模式样式 */
    body.dark-mode {
      --mask-color: 30, 34, 40;
      --page-bg: #181a1f;
      --text-main: #f1f1f1;
      --text-sub: #b8b8b8;
      --control-bg: rgba(30, 34, 40, 0.75);
      --control-text: #f1f1f1;
      --control-border: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--page-bg);
      font-family: "PingFang SC", -apple-system, "SF Pro Text", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero ──────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
      cursor: crosshair;
    }

    .hero__bg {
      position: absolute;
      inset: 0;
      background-image: url("国图.png");
      background-size: 80%;
      background-position: center;
    }

    .hero__mask {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      display: block;
    }

    .hero__content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      text-align: center;
      padding: 0 20px;
      pointer-events: none;
    }

    .hero__title {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 16px;
      text-shadow: 0 2px 20px rgba(245, 243, 239, 0.6);
      display: inline-flex;
      gap: 2px;
    }

    .hero__subtitle {
      font-size: clamp(14px, 2vw, 22px);
      font-weight: 400;
      color: var(--text-sub);
      letter-spacing: 0.5px;
      text-shadow: 0 1px 10px rgba(245, 243, 239, 0.6);
      display: inline-flex;
      gap: 1px;
    }

    .char-span {
      transition: opacity var(--text-fade) ease;
      will-change: opacity;
    }

    .hero__hint {
      position: absolute;
      bottom: 40px;
      font-size: 13px;
      color: #979696;
      letter-spacing: 1px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* 明暗切换开关样式 */
    .theme-switch-wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 0.5px solid var(--control-border);
    }
    .theme-label {
      font-size: 12.5px;
      color: var(--control-text);
    }
    .theme-switch {
      position: relative;
      width: 40px;
      height: 20px;
    }
    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #3b82f6;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }

    /* ── 控制面板 ────────────────── */
    .settings-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 200;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.06);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
      color: #1d1d1f;
    }

    .settings-toggle:hover {
      background: rgba(255,255,255,0.95);
      transform: scale(1.05);
    }

    .settings-toggle:active {
      transform: scale(0.95);
    }

    .settings-toggle svg {
      width: 18px;
      height: 18px;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .settings-toggle.open svg {
      transform: rotate(90deg);
    }

    .controls {
      position: fixed;
      top: 16px;
      right: 60px;
      z-index: 150;
      background: var(--control-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 14px;
      padding: 0;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.04),
        0 8px 32px rgba(0,0,0,0.06),
        0 0 0 0.5px rgba(0,0,0,0.05);
      font-size: 13px;
      color: var(--control-text);
      width: 240px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      transform-origin: top right;
      transition:
        max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.25s ease,
        transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .controls.open {
      max-height: 600px;
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .controls-inner {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .controls .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #86868b;
      padding: 6px 0 2px;
    }

    .controls .sep {
      height: 0.5px;
      background: var(--control-border);
      margin: 2px 0;
    }

    .controls label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--control-text);
      font-size: 12.5px;
    }

    .controls .color-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--control-text);
      font-size: 12.5px;
    }

    .controls input[type="color"] {
      width: 28px;
      height: 22px;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 5px;
      padding: 1px 2px;
      cursor: pointer;
      background: transparent;
      -webkit-appearance: none;
    }

    .controls input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 1px;
    }

    .controls input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 3px;
    }

    .controls input[type="range"] {
      width: 72px;
      height: 4px;
      accent-color: #3b82f6;
      border-radius: 2px;
    }

    .controls .val {
      font-variant-numeric: tabular-nums;
      min-width: 28px;
      text-align: right;
      color: #86868b;
      font-weight: 500;
      font-size: 11.5px;
    }

    .controls .btn-row {
      display: flex;
      gap: 8px;
      padding-top: 4px;
    }

    .controls .btn-row button {
      flex: 1;
      padding: 6px 0;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .controls .btn-row button:active {
      transform: scale(0.97);
    }

    .controls .btn-secondary {
      background: rgba(0,0,0,0.05);
      color: var(--control-text);
    }

    .controls .btn-secondary:hover {
      background: rgba(0,0,0,0.08);
    }

    .controls .btn-primary {
      background: #3b82f6;
      color: #fff;
    }

    .controls .btn-primary:hover {
      background: #448cf8;
    }

    /* ── 底部卡片 ─────────────────────────────────── */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 20px;
      background: linear-gradient(to top, rgba(245,243,239,0.6) 0%, transparent 100%);
      pointer-events: none;
    }
    body.dark-mode .bottom-bar {
      background: linear-gradient(to top, rgba(24, 26, 31, 0.7) 0%, transparent 100%);
    }

    .border-glow-card {
      position: relative;
      border-radius: var(--border-radius);
      isolation: isolate;
      transform: translate3d(0, 0, 0.01px);
      display: grid;
      border: 1px solid rgb(0 0 0 / 10%);
      background: var(--card-bg);
      overflow: visible;
      width: 280px;
      pointer-events: auto;
      cursor: pointer;
      box-shadow:
        rgba(0,0,0,0.06) 0px 1px 2px,
        rgba(0,0,0,0.06) 0px 2px 4px,
        rgba(0,0,0,0.06) 0px 4px 8px,
        rgba(0,0,0,0.06) 0px 8px 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    body.dark-mode .border-glow-card {
      border: 1px solid rgba(255,255,255,0.1);
    }

    .border-glow-card:hover {
      transform: translate3d(0, -2px, 0.01px);
      box-shadow:
        rgba(0,0,0,0.08) 0px 2px 4px,
        rgba(0,0,0,0.08) 0px 4px 8px,
        rgba(0,0,0,0.08) 0px 8px 16px,
        rgba(0,0,0,0.08) 0px 16px 32px;
    }

    .border-glow-card::before,
    .border-glow-card::after,
    .border-glow-card > .edge-light {
      content: ""; position: absolute; inset: 0;
      border-radius: inherit;
      transition: opacity 0.25s ease-out;
      z-index: -1;
    }
    .border-glow-card:not(:hover):not(.sweep-active)::before,
    .border-glow-card:not(:hover):not(.sweep-active)::after,
    .border-glow-card:not(:hover):not(.sweep-active) > .edge-light {
      opacity: 0;
      transition: opacity 0.75s ease-in-out;
    }
    .border-glow-card::before {
      border: 1px solid transparent;
      background:
        linear-gradient(var(--card-bg) 0 100%) padding-box,
        linear-gradient(rgb(255 255 255 / 0%) 0% 100%) border-box,
        var(--gradient-one) border-box, var(--gradient-two) border-box,
        var(--gradient-three) border-box, var(--gradient-four) border-box,
        var(--gradient-five) border-box, var(--gradient-six) border-box,
        var(--gradient-seven) border-box, var(--gradient-base) border-box;
      opacity: calc((var(--edge-proximity) - var(--color-sensitivity)) / (100 - var(--color-sensitivity)));
      mask-image: conic-gradient(from var(--cursor-angle) at center,
        black calc(var(--cone-spread) * 1%),
        transparent calc((var(--cone-spread) + 15) * 1%),
        transparent calc((100 - var(--cone-spread) - 15) * 1%),
        black calc((100 - var(--cone-spread)) * 1%));
    }
    .border-glow-card::after {
      border: 1px solid transparent;
      background:
        var(--gradient-one) padding-box, var(--gradient-two) padding-box,
        var(--gradient-three) padding-box, var(--gradient-four) padding-box,
        var(--gradient-five) padding-box, var(--gradient-six) padding-box,
        var(--gradient-seven) padding-box, var(--gradient-base) padding-box;
      mask-image:
        linear-gradient(to bottom, black, black),
        radial-gradient(ellipse at 50% 50%, black 40%, transparent 65%),
        radial-gradient(ellipse at 66% 66%, black 5%, transparent 40%),
        radial-gradient(ellipse at 33% 33%, black 5%, transparent 40%),
        radial-gradient(ellipse at 66% 33%, black 5%, transparent 40%),
        radial-gradient(ellipse at 33% 66%, black 5%, transparent 40%),
        conic-gradient(from var(--cursor-angle) at center, transparent 5%, black 15%, black 85%, transparent 95%);
      mask-composite: subtract, add, add, add, add, add;
      opacity: calc(var(--fill-opacity, 0.5) * (var(--edge-proximity) - var(--color-sensitivity)) / (100 - var(--color-sensitivity)));
      mix-blend-mode: soft-light;
    }
    .border-glow-card > .edge-light {
      inset: calc(var(--glow-padding) * -1);
      pointer-events: none; z-index: 1;
      mask-image: conic-gradient(from var(--cursor-angle) at center, black 2.5%, transparent 10%, transparent 90%, black 97.5%);
      opacity: calc((var(--edge-sensitivity) - var(--edge-sensitivity)) / (100 - var(--edge-sensitivity)));
      mix-blend-mode: plus-lighter;
    }
    .border-glow-card > .edge-light::before {
      content: ""; position: absolute;
      inset: var(--glow-padding);
      border-radius: inherit;
      box-shadow:
        inset 0 0 0 1px var(--glow-color),
        inset 0 0 1px 0 var(--glow-color-60),
        inset 0 0 3px 0 var(--glow-color-50),
        inset 0 0 6px 0 var(--glow-color-40),
        inset 0 0 15px 0 var(--glow-color-30),
        inset 0 0 25px 2px var(--glow-color-20),
        inset 0 0 50px 2px var(--glow-color-10),
        0 0 1px 0 var(--glow-color-60),
        0 0 3px 0 var(--glow-color-50),
        0 0 6px 0 var(--glow-color-40),
        0 0 15px 0 var(--glow-color-30),
        0 0 25px 2px var(--glow-color-20),
        0 0 50px 2px var(--glow-color-10);
    }
    .border-glow-inner {
      display: flex; flex-direction: column;
      position: relative; overflow: auto;
      z-index: 1; padding: 14px 24px;
      color: var(--text-main); text-align: center;
    }
    .border-glow-inner h2 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .border-glow-inner a {
  color: var(--text-main);    /* 跟随页面明暗文字色，变回原本颜色 */
  text-decoration: none;      /* 彻底去掉下划线 */
  display: block;
  width: 100%;
}
    
  </style>
</head>
<body>

  <section class="hero" id="hero">
    <div class="hero__bg"></div>
    <canvas class="hero__mask" id="heroMask"></canvas>
    <div class="hero__content">
      <h1 class="hero__title" id="heroTitle">探索未知的风景</h1>
      <p class="hero__subtitle" id="heroSubtitle">移动鼠标发现隐藏的画面</p>
    </div>
  </section>

  <button class="settings-toggle" id="settingsToggle" aria-label="设置">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <div class="controls" id="controlsPanel">
    <div class="controls-inner">
      <!-- 明暗切换开关 -->
      <div class="theme-switch-wrap">
        <span class="theme-label">深色模式</span>
        <label class="theme-switch">
          <input type="checkbox" id="themeToggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="section-title">参数调节</div>
      <label>
        墨点大小
        <input type="range" id="ctrlSize" min="20" max="200" value="80" />
        <span class="val" id="valSize">80</span>
      </label>
      <label>
        淡化速度
        <input type="range" id="ctrlLife" min="200" max="2000" value="700" />
        <span class="val" id="valLife">700</span>
      </label>
      <label>
        墨点间距
        <input type="range" id="ctrlStep" min="4" max="30" value="10" />
        <span class="val" id="valStep">10</span>
      </label>
      <label>
        光晕范围
        <input type="range" id="ctrlGlowRange" min="20" max="120" value="60" />
        <span class="val" id="valGlowRange">60</span>
      </label>

      <div class="sep"></div>
      <div class="section-title">颜色调节</div>

      <div class="color-row">
        擦拭遮罩色
        <input type="color" id="ctrlMaskColor" value="#f8f4ec" />
      </div>
      <div class="color-row">
        卡片光晕色
        <input type="color" id="ctrlGlow" value="#3b82f6" />
      </div>
      <div class="color-row">
        卡片背景色
        <input type="color" id="ctrlCardBg" value="#ffffff" />
      </div>
      <label>
        卡片透明度
        <input type="range" id="ctrlCardAlpha" min="0" max="100" value="85" />
        <span class="val" id="valCardAlpha">33%</span>
      </label>

      <div class="sep"></div>
      <div class="btn-row">
        <button class="btn-secondary" id="ctrlReset">重置遮罩</button>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="border-glow-card" id="glowCard">
      <span class="edge-light"></span>
      <div class="border-glow-inner">
        <a href="appmain.html">
          <h2>开始探索</h2>
        </a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const hero  = document.getElementById("hero");
      const canvas = document.getElementById("heroMask");
      if (!hero || !canvas) return;

      if (!window.matchMedia("(hover: hover)").matches) {
        canvas.style.display = "none";
        return;
      }

      const ctx = canvas.getContext("2d");
      if (!ctx) return;

      const params = {
        maskColor: "248, 244, 236",
        eraseColor: "0, 0, 0",
        eraseAlpha: 0,
        rEnd: 80,
        lifetime: 700,
        step: 10,
        maxStamps: 200,
      };

      const R_START = 6;
      const R_VARY  = 0.45;
      const DPR = Math.min(window.devicePixelRatio || 1, 2);

      let w = 0, h = 0;

      function resize() {
        const rect = hero.getBoundingClientRect();
        w = rect.width;
        h = rect.height;
        canvas.width  = Math.round(w * DPR);
        canvas.height = Math.round(h * DPR);
        canvas.style.width  = w + "px";
        canvas.style.height = h + "px";
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        fillMask();
      }

      function fillMask() {
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "rgb(" + params.maskColor + ")";
        ctx.fillRect(0, 0, w, h);
      }

      resize();
      window.addEventListener("resize", resize);

      const stamps = [];
      let lastX = null, lastY = null;

      function addStamp(x, y) {
        if (stamps.length >= params.maxStamps) stamps.shift();
        stamps.push({
          x, y,
          born: performance.now(),
          seed: Math.random() * Math.PI * 2,
          rmax: params.rEnd * (1 - R_VARY + Math.random() * R_VARY),
        });
      }

      function stampAlong(x, y) {
        if (lastX === null) { addStamp(x, y); }
        else {
          const dx = x - lastX, dy = y - lastY;
          const dist = Math.hypot(dx, dy);
          const steps = Math.max(1, Math.ceil(dist / params.step));
          for (let i = 1; i <= steps; i++)
            addStamp(lastX + (dx * i) / steps, lastY + (dy * i) / steps);
        }
        lastX = x; lastY = y;
      }

      function carveInk(x, y, r, alpha, seed) {
        const g = ctx.createRadialGradient(x, y, r * 0.2, x, y, r);
        g.addColorStop(0,   "rgba(0,0,0," + (0.95 * alpha) + ")");
        g.addColorStop(0.5, "rgba(0,0,0," + (0.85 * alpha) + ")");
        g.addColorStop(1,   "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        for (let i = 0; i <= 32; i++) {
          const a = (i / 32) * Math.PI * 2;
          const wob = 0.78
            + 0.14 * Math.sin(a * 3 + seed)
            + 0.08 * Math.sin(a * 7 + seed * 2.1)
            + 0.05 * Math.sin(a * 13 + seed * 0.7);
          const px = x + Math.cos(a) * r * wob;
          const py = y + Math.sin(a) * r * wob;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
      }

      let running = false;

      function loop() {
        const now = performance.now();
        fillMask();
        ctx.globalCompositeOperation = "destination-out";
        for (let i = stamps.length - 1; i >= 0; i--) {
          const s = stamps[i];
          const t = (now - s.born) / params.lifetime;
          if (t >= 1) { stamps.splice(i, 1); continue; }
          const ease = 1 - Math.pow(1 - t, 3);
          const r = R_START + (s.rmax - R_START) * ease;
          carveInk(s.x, s.y, r, 1 - t * t, s.seed);
        }
        if (stamps.length) {
          requestAnimationFrame(loop);
        } else {
          running = false;
        }
      }

      function start() { if (!running) { running = true; requestAnimationFrame(loop); } }

      hero.addEventListener("mouseenter", (e) => {
        const rect = hero.getBoundingClientRect();
        lastX = e.clientX - rect.left;
        lastY = e.clientY - rect.top;
        stampAlong(lastX, lastY); start();
      });
      hero.addEventListener("mousemove", (e) => {
        const rect = hero.getBoundingClientRect();
        stampAlong(e.clientX - rect.left, e.clientY - rect.top); start();
        updateTextOpacity(e);
      });
      hero.addEventListener("mouseleave", () => { 
        lastX = lastY = null; 
        resetTextOpacity();
      });

      function splitTextIntoChars() {
        const title = document.getElementById('heroTitle');
        const subtitle = document.getElementById('heroSubtitle');
        const titleText = title.textContent.trim();
        title.innerHTML = '';
        for (let char of titleText) {
          const span = document.createElement('span');
          span.className = 'char-span';
          span.textContent = char === ' ' ? '\u00A0' : char;
          title.appendChild(span);
        }
        const subtitleText = subtitle.textContent.trim();
        subtitle.innerHTML = '';
        for (let char of subtitleText) {
          const span = document.createElement('span');
          span.className = 'char-span';
          span.textContent = char === ' ' ? '\u00A0' : char;
          subtitle.appendChild(span);
        }
      }

      function updateTextOpacity(e) {
        const charSpans = document.querySelectorAll('.char-span');
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        const fadeRadius = 120;
        charSpans.forEach(span => {
          const rect = span.getBoundingClientRect();
          const spanX = rect.left + rect.width / 2;
          const spanY = rect.top + rect.height / 2;
          const distance = Math.hypot(mouseX - spanX, mouseY - spanY);
          span.style.opacity = distance < fadeRadius ? 0 : 1;
        });
      }

      function resetTextOpacity() {
        const charSpans = document.querySelectorAll('.char-span');
        charSpans.forEach(span => {
          span.style.opacity = 1;
        });
      }

      splitTextIntoChars();

      const toggle  = document.getElementById("settingsToggle");
      const panel   = document.getElementById("controlsPanel");
      toggle.addEventListener("click", () => {
        const isOpen = panel.classList.toggle("open");
        toggle.classList.toggle("open", isOpen);
      });

      const ctrlSize = document.getElementById("ctrlSize");
      const ctrlLife = document.getElementById("ctrlLife");
      const ctrlStep = document.getElementById("ctrlStep");
      const valSize  = document.getElementById("valSize");
      const valLife  = document.getElementById("valLife");
      const valStep  = document.getElementById("valStep");
      const btnReset = document.getElementById("ctrlReset");

      ctrlSize.addEventListener("input", () => { params.rEnd = +ctrlSize.value; valSize.textContent = ctrlSize.value; });
      ctrlLife.addEventListener("input", () => {
        params.lifetime = +ctrlLife.value;
        valLife.textContent = ctrlLife.value;
        const sec = params.lifetime / 1000;
        document.documentElement.style.setProperty('--text-fade', sec + 's');
      });
      ctrlStep.addEventListener("input", () => { params.step = +ctrlStep.value; valStep.textContent = ctrlStep.value; });
      btnReset.addEventListener("click", () => { stamps.length = 0; fillMask(); });

      function hexToRgb(hex) {
        return parseInt(hex.slice(1,3),16) + ", " + parseInt(hex.slice(3,5),16) + ", " + parseInt(hex.slice(5,7),16);
      }

      document.getElementById("ctrlMaskColor").addEventListener("input", (e) => {
        params.maskColor = hexToRgb(e.target.value);
        stamps.length = 0; fillMask();
      });

      const card = document.getElementById('glowCard');

      function hexToHSL(hex) {
        let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
        const max = Math.max(r,g,b), min = Math.min(r,g,b);
        let h, s, l = (max+min)/2;
        if (max === min) { h = s = 0; }
        else { const d = max-min; s = l>0.5 ? d/(2-max-min) : d/(max+min);
          switch(max) { case r: h=((g-b)/d+(g<b?6:0))/6; break; case g: h=((b-r)/d+2)/6; break; case b: h=((r-g)/d+4)/6; break; }
        }
        return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
      }

      function updateGlowColors() {
        const { h, s, l } = hexToHSL(document.getElementById('ctrlGlow').value);
        const c1 = `hsl(${h},${s}%,${l}%)`, c2 = `hsl(${(h+120)%360},${s}%,${l}%)`, c3 = `hsl(${(h+240)%360},${s}%,${l}%)`;
        const colors = [c1, c2, c3];
        const POS = ['80% 55%','69% 34%','8% 6%','41% 38%','86% 85%','82% 18%','51% 4%'];
        const KEYS = ['--gradient-one','--gradient-two','--gradient-three','--gradient-four','--gradient-five','--gradient-six','--gradient-seven'];
        const CMAP = [0,1,2,0,1,2,1];
        for (let i = 0; i < 7; i++) card.style.setProperty(KEYS[i], `radial-gradient(at ${POS[i]}, ${colors[Math.min(CMAP[i],2)]} 0px, transparent 50%)`);
        card.style.setProperty('--gradient-base', `linear-gradient(${c1} 0 100%)`);
      }
      document.getElementById('ctrlGlow').addEventListener('input', updateGlowColors);

      function updateCardBg() {
        const hex = document.getElementById('ctrlCardBg').value;
        const alpha = document.getElementById('ctrlCardAlpha').value / 100;
        card.style.setProperty('--card-bg', `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${alpha})`);
      }
      document.getElementById('ctrlCardBg').addEventListener('input', updateCardBg);
      document.getElementById('ctrlCardAlpha').addEventListener('input', (e) => {
        document.getElementById('valCardAlpha').textContent = e.target.value + '%'; updateCardBg();
      });

      document.getElementById('ctrlGlowRange').addEventListener('input', (e) => {
        document.getElementById('valGlowRange').textContent = e.target.value;
        card.style.setProperty('--glow-padding', e.target.value + 'px');
      });

    
      /* 明暗模式切换逻辑 */
      const themeToggle = document.getElementById('themeToggle');
      function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        if(isDark){
          params.maskColor = "30, 34, 40";
          document.getElementById('ctrlMaskColor').value = "#1e2228";
        }else{
          params.maskColor = "248, 244, 236";
          document.getElementById('ctrlMaskColor').value = "#f8f4ec";
        }
        stamps.length = 0;
        fillMask();
      }
      themeToggle.addEventListener('change', toggleDarkMode);

      (function initGlowCard() {
        const config = {
          edgeSensitivity: 20, glowColor: "40 80 80",
          backgroundColor: "rgba(255,255,255,0.33)",
          borderRadius: 24, glowRadius: 60, glowIntensity: 1.4,
          coneSpread: 30, colors: ['#3b82f6','#f472b6','#38bdf8'], fillOpacity: 0.6
        };
        const POS = ['80% 55%','69% 34%','8% 6%','41% 38%','86% 85%','82% 18%','51% 4%'];
        const KEYS = ['--gradient-one','--gradient-two','--gradient-three','--gradient-four','--gradient-five','--gradient-six','--gradient-seven'];
        const CMAP = [0,1,2,0,1,2,1];

        function buildGlowVars(color, intensity) {
          const m = color.match(/([\d.]+)\s*([\d.]+)%?\s*([\d.]+)%?/);
          const h=m?+m[1]:40, s=m?+m[2]:80, l=m?+m[3]:80;
          const base = `${h}deg ${s}% ${l}%`;
          const ops=[100,60,50,40,30,20,10], keys=['','-60','-50','-40','-30','-20','-10'];
          const v={}; for(let i=0;i<7;i++) v[`--glow-color${keys[i]}`]=`hsl(${base} / ${Math.min(ops[i]*intensity,100)}%)`;
          return v;
        }
        function buildGradientVars(colors) {
          const v={}; for(let i=0;i<7;i++) v[KEYS[i]]=`radial-gradient(at ${POS[i]}, ${colors[Math.min(CMAP[i],colors.length-1)]} 0px, transparent 50%)`;
          v['--gradient-base']=`linear-gradient(${colors[0]} 0 100%)`; return v;
        }

        card.style.setProperty('--card-bg', config.backgroundColor);
        card.style.setProperty('--edge-sensitivity', config.edgeSensitivity);
        card.style.setProperty('--border-radius', config.borderRadius + 'px');
        card.style.setProperty('--glow-padding', config.glowRadius + 'px');
        card.style.setProperty('--cone-spread', config.coneSpread);
        card.style.setProperty('--fill-opacity', config.fillOpacity);
        Object.entries(buildGlowVars(config.glowColor, config.glowIntensity)).forEach(([k,v]) => card.style.setProperty(k, v));
        Object.entries(buildGradientVars(config.colors)).forEach(([k,v]) => card.style.setProperty(k, v));

        card.addEventListener('pointermove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX-rect.left, y = e.clientY-rect.top;
          const [cx,cy] = [rect.width/2, rect.height/2];
          const dx=x-cx, dy=y-cy;
          let kx=Infinity, ky=Infinity;
          if(dx) kx=cx/Math.abs(dx); if(dy) ky=cy/Math.abs(dy);
          const edge = Math.min(Math.max(1/Math.min(kx,ky),0),1);
          let deg = Math.atan2(dy,dx)*(180/Math.PI)+90;
          if(deg<0) deg+=360;
          card.style.setProperty('--cursor-angle', deg.toFixed(3)+'deg');
          card.style.setProperty('--edge-proximity', (edge*100).toFixed(3));
        });
      })();

    })();
  </script>
